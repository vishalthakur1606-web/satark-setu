    <!-- Google Fonts -->

    <style>
        * { font-family: 'Inter', sans-serif; }
        
        /* Custom Animations */
        @keyframes gradient-shift { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }
        
        @keyframes float { 
            0%, 100% { transform: translateY(0px); } 
            50% { transform: translateY(-10px); } 
        }
        
        @keyframes pulse-glow { 
            0%, 100% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); } 
            50% { box-shadow: 0 0 40px rgba(239, 68, 68, 0.8); } 
        }
        
        @keyframes slide-up { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        @keyframes shimmer { 
            0% { background-position: -1000px 0; } 
            100% { background-position: 1000px 0; } 
        }
        
        .gradient-animated { 
            background: linear-gradient(-45deg, #ef4444, #dc2626, #b91c1c, #991b1b);
            background-size: 400% 400%;
            animation: gradient-shift 15s ease infinite;
        }
        
        .float-animation { animation: float 6s ease-in-out infinite; }
        .pulse-glow { animation: pulse-glow 2s infinite; }
        .slide-up { animation: slide-up 0.6s ease-out; }
        
        .shimmer { 
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite;
        }
        
        /* Glass morphism */
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glass-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.95) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(180deg, #ef4444, #dc2626); 
            border-radius: 10px; 
        }
        ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #dc2626, #b91c1c); }
        
        /* Map container */
        .leaflet-container { 
            background: #1e293b; 
            z-index: 1;
        }
        
        /* Card hover effects */
        .hover-lift { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .hover-lift:hover { 
            transform: translateY(-8px) scale(1.02); 
            box-shadow: 0 20px 40px rgba(239, 68, 68, 0.3); 
        }
        
        /* Neon glow text */
        .neon-text {
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.5),
                         0 0 20px rgba(239, 68, 68, 0.3),
                         0 0 30px rgba(239, 68, 68, 0.2);
        }
        
        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite;
        }
    </style>

        }

</head>

        function DisasterMap() {
            const mapRef = useRef(null);

            useEffect(() => {
                if (!mapRef.current) {
                    mapRef.current = L.map('disasterMap').setView([19.0760, 72.8777], 11);
                    
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                        attribution: '© OpenStreetMap © CARTO',
                        subdomains: 'abcd'
                    }).addTo(mapRef.current);

                    const locations = [
                        { lat: 19.1136, lng: 72.8697, type: 'critical', location: 'Andheri', desc: 'Severe waterlogging' },
                        { lat: 19.0176, lng: 72.8562, type: 'warning', location: 'Worli', desc: 'High winds' },
                        { lat: 19.0728, lng: 72.8826, type: 'advisory', location: 'Dadar', desc: 'Traffic disruption' },
                        { lat: 19.1334, lng: 72.9133, type: 'critical', location: 'Ghatkopar', desc: 'Flooding risk' },
                        { lat: 18.9388, lng: 72.8354, type: 'warning', location: 'Colaba', desc: 'Coastal flooding' }
                    ];

                    const typeStyles = {
                        critical: { color: '#ef4444', radius: 20 },
                        warning: { color: '#f97316', radius: 15 },
                        advisory: { color: '#3b82f6', radius: 12 }
                    };

                    locations.forEach(loc => {
                        const style = typeStyles[loc.type];
                        const circle = L.circleMarker([loc.lat, loc.lng], {
                            radius: style.radius,
                            fillColor: style.color,
                            color: '#fff',
                            weight: 3,
                            opacity: 1,
                            fillOpacity: 0.7
                        }).addTo(mapRef.current);

                        circle.bindPopup(`
                            <div style="background: #1e293b; color: white; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);">
